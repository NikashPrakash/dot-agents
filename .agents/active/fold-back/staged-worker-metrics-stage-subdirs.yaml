observation: Replacement-retry metrics in ralph-pipeline currently undercount staged runs because metrics collection scans only the bundle log root for worker-iter files while staged workers now write per-iteration logs under stage-specific subdirectories like stage-impl/ and stage-verifier+unit/. This leaves worker_iterations and token_detail at zero or empty for successful staged runs. Follow-on should make metrics aggregation recurse through stage subdirectories or aggregate from a stage-owned manifest so staged execution preserves accurate observability.
