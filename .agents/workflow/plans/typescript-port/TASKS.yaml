    - id: ts-ab-workflow-commands
      title: AB-test A — Implement read-only workflow commands in TS port (orient, tasks, health)
      status: in_progress
      depends_on:
        - phase-4-advanced-surface-decision
      blocks: []
      owner: dot-agents
      write_scope:
        - ports/typescript/src/commands/workflow.ts
        - ports/typescript/tests/workflow.test.ts
      verification_required: true
      notes: |
        Worker A/B comparison task. Pattern E worker.
        Implement three read-only workflow command stubs in TS:
        - `runWorkflowOrient(opts)` → reads loop-state.md Current Position if present, returns {branch, plan, task}
        - `runWorkflowTasks(planId, opts)` → reads TASKS.yaml for the plan, returns task list
        - `runWorkflowHealth(opts)` → checks workflow/ dir exists + has PLAN.yaml, returns {healthy, warnings[]}
        All three take `agentsHomeOverride?` + `repoRootOverride?`. No Go CLI invocation — pure TS file reads.
        Write positive + negative tests (missing file, empty plan, unknown plan) in workflow.test.ts.
        Run: `cd ports/typescript && npm test` — all tests must pass.
        feedback_goal: Do the three workflow read-only commands parse real YAML/MD fixtures and return
        structured results matching the Go CLI shape?
