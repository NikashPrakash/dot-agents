schema_version: 1
plan_id: typescript-port
tasks:
    - id: phase-1-donor-audit-and-docs
      title: Phase 1 — Audit donor branch and write the current-contract port plan
      status: in_progress
      depends_on: []
      blocks:
        - phase-2-foundations-on-current-contracts
      owner: dot-agents
      write_scope:
        - .agents/active/
        - .agents/workflow/plans/
        - docs/
      verification_required: false
      notes: |
        Capture the office-machine donor branch (`origin/feature/go-fixes-and-typescript-port-for-availability-on-restricted-machines`)
        as source material, not as a merge target. Rewrite the port plan around the current repo:
        1. `.agentsrc.json` unknown-field preservation
        2. Codex `developer_instructions` TOML output
        3. current hook renderer shapes
        4. workflow command surface
        5. Stage 2 bucket and plugin-roadmap boundaries
    - id: phase-2-foundations-on-current-contracts
      title: Phase 2 — Rebuild core config, path, link, and hook foundations on current contracts
      status: pending
      depends_on:
        - phase-1-donor-audit-and-docs
      blocks:
        - phase-3-stage1-command-mvp
      owner: dot-agents
      write_scope:
        - ports/typescript/src/core/
        - ports/typescript/src/platforms/
        - ports/typescript/tests/
      verification_required: true
      notes: |
        Port only the donor subtree that still matches current behavior. Required parity targets:
        - unknown `.agentsrc.json` field round-trip and source merge behavior
        - MCP detection compatibility (`servers`, documented `mcpServers`, and `.mcp.json` inputs)
        - Codex TOML `developer_instructions` emission instead of `is_background`
        - hook render/import expectations proven by current Go tests
    - id: phase-3-stage1-command-mvp
      title: Phase 3 — Land a bounded Stage 1 command MVP for restricted machines
      status: pending
      depends_on:
        - phase-2-foundations-on-current-contracts
      blocks:
        - phase-4-advanced-surface-decision
      owner: dot-agents
      write_scope:
        - ports/typescript/src/cli.ts
        - ports/typescript/src/commands/
        - ports/typescript/tests/
      verification_required: true
      notes: |
        Initial MVP stays intentionally narrow:
        `init`, `add`, `refresh`, `status`, `doctor`, `skills`, `agents`, `hooks`.
        `import` may join the MVP only if its canonicalization logic can be kept aligned with current Go tests without
        pulling in Stage 2/plugin assumptions prematurely.
    - id: phase-4-advanced-surface-decision
      title: Phase 4 — Decide and document the TS boundary for workflow and KG features
      status: pending
      depends_on:
        - phase-3-stage1-command-mvp
      blocks:
        - phase-6-release-and-docs
      owner: dot-agents
      write_scope:
        - docs/
        - ports/typescript/src/
        - ports/typescript/tests/
      verification_required: true
      notes: |
        Do not imply full CLI parity by default. Make an explicit call between:
        1. config-and-resource-only Windows port
        2. selected `workflow` read-only surfaces
        3. broader parity that includes KG bridge and orchestration commands
        The chosen boundary must be reflected in CLI help, docs, and tests.
    - id: phase-5-stage2-and-plugin-alignment
      title: Phase 5 — Align the TS port with Stage 2 buckets and plugin resources after current Go contracts settle
      status: pending
      depends_on:
        - phase-3-stage1-command-mvp
      blocks:
        - phase-6-release-and-docs
      owner: dot-agents
      write_scope:
        - ports/typescript/src/platforms/
        - ports/typescript/src/commands/
        - ports/typescript/tests/
        - docs/
      verification_required: true
      notes: |
        External dependency lane. This phase should follow, not race, the Go-side contract work in:
        - `platform-dir-unification` Phase 5 (commands, output-styles, modes, plugins, themes, prompts)
        - `plugin-resource-salvage` Phases 4-5 (import/status/explain/doctor plugin readback and closeout)
        Until those settle, the TypeScript port should treat plugins and Stage 2 buckets as deferred scope.
    - id: phase-6-release-and-docs
      title: Phase 6 — Package, document, and validate the Windows-friendly release path
      status: pending
      depends_on:
        - phase-4-advanced-surface-decision
        - phase-5-stage2-and-plugin-alignment
      blocks: []
      owner: dot-agents
      write_scope:
        - ports/typescript/
        - README.md
        - docs/
      verification_required: true
      notes: |
        Finalize packaging, command naming, installation instructions, and platform support language.
        The README should describe the TypeScript port as an explicit variant with declared capability boundaries,
        not as a silent replacement for the Go CLI.
