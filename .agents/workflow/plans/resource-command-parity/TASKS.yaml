schema_version: 1
plan_id: resource-command-parity
tasks:
    - id: phase-1-command-contract
      title: Phase 1 — Define command-surface contract and scope boundaries for managed resources
      status: in_progress
      depends_on: []
      blocks:
        - phase-2-hooks-lifecycle
        - phase-3-rules-lifecycle
        - phase-4-mcp-settings-lifecycle
        - phase-5-readback-alignment
      owner: dot-agents
      write_scope:
        - .agents/workflow/plans/resource-command-parity/
        - docs/
        - commands/
      verification_required: true
      notes: |-
        Capture the approved audit into a canonical contract:
        - hooks currently has only `hooks list`
        - rules, mcp, and settings have no dedicated command families and are managed indirectly
          through add/import/refresh/install/remove/status
        - agents are explicitly out of scope here (covered by agent-resource-lifecycle)
        - context, memory, and profiles remain out of scope by design unless a separate contract is approved

        Decide whether parity lands as per-resource families (`hooks ...`, `rules ...`, etc.) or a
        shared lifecycle surface with resource-specific adapters, then document the rationale before implementation.

        **feedback_goal:** Land the written contract under this plan + `docs/` + `commands/` such that later phases cite a single source of truth; tests/docs reflect boundaries above.

        **write_scope:** `.agents/workflow/plans/resource-command-parity/`, `docs/`, `commands/` (broad — coordinate merges with in-flight work touching the same command files).

        **context:** **`workflow next` selects this task** while PLAN `current_focus_task` is Phase 1 (verify alignment). **Do not fan out** a second broad `commands/` worker while **`phase-5-readback-alignment`** is in progress unless scopes are explicitly partitioned — merge conflict risk on shared command paths.

        **reconciliation:** **`phase-2-hooks-lifecycle` is `completed`** while this task remains `pending` — parent should confirm contract artifacts landed and **`workflow advance`** this task when accurate.
    - id: phase-2-hooks-lifecycle
      title: Phase 2 — Add coherent hook lifecycle commands on top of canonical HOOK.yaml bundles
      status: completed
      depends_on:
        - phase-1-command-contract
      blocks:
        - phase-5-readback-alignment
      owner: dot-agents
      write_scope:
        - commands/hooks.go
        - commands/hooks_test.go
        - commands/import.go
        - commands/remove.go
        - internal/platform/hooks.go
      verification_required: true
      notes: |-
        Extend the existing `hooks list` surface into an intentional lifecycle path that matches the
        canonical hook-bundle model instead of forcing users through indirect side effects.

        Minimum outcome:
        - hook resources can be discovered and explicitly wired/removed without spelunking raw files
        - command help matches the canonical bundle model used by import/refresh/install/remove
        - repo vs global scope behavior is documented and tested
    - id: phase-3-rules-lifecycle
      title: Phase 3 — Add explicit rules lifecycle surface and reconcile platform-specific projections
      status: pending
      depends_on:
        - phase-1-command-contract
      blocks:
        - phase-5-readback-alignment
      owner: dot-agents
      write_scope:
        - commands/
        - internal/platform/
        - docs/
      verification_required: true
      notes: |-
        Rules are canonically managed today but have no dedicated command family. Implement the chosen
        lifecycle surface and keep the Cursor/Claude/Codex projection details behind the command layer.
    - id: phase-4-mcp-settings-lifecycle
      title: Phase 4 — Add explicit MCP and settings lifecycle surfaces without duplicating emitter logic
      status: pending
      depends_on:
        - phase-1-command-contract
      blocks:
        - phase-5-readback-alignment
      owner: dot-agents
      write_scope:
        - commands/
        - internal/platform/
        - internal/config/
        - docs/
      verification_required: true
      notes: |-
        MCP and settings are especially prone to split-brain because install/refresh/remove already
        touch them. Reuse the shared planner/executor path rather than adding parallel custom wiring.
    - id: phase-5-readback-alignment
      title: Phase 5 — Align status, explain, doctor, install, and remove with the new resource contract
      status: completed
      depends_on:
        - phase-2-hooks-lifecycle
        - phase-3-rules-lifecycle
        - phase-4-mcp-settings-lifecycle
      blocks: []
      owner: dot-agents
      write_scope:
        - commands/status.go
        - commands/explain.go
        - commands/doctor.go
        - commands/install.go
        - commands/remove.go
        - docs/
      verification_required: true
      notes: |-
        **feedback_goal:** Close the loop so readback and lifecycle management tell the same story: status, explain, doctor, install, and remove must match the resource contract; user-visible copy stops implying first-class lifecycle where behavior is still implicit; `go test` for touched commands + targeted smoke green; merge-back ready.

        **write_scope:** commands/status.go, commands/explain.go, commands/doctor.go, commands/install.go, commands/remove.go, docs/

        **context:** Active delegation bundle `.agents/active/delegation-bundles/del-phase-5-readback-alignment-1776538664.yaml` (overlay `.agents/active/active.loop.md`; context: `.agents/active/loop-state.md`, this TASKS.yaml). Profile: **loop-worker**. Worker runs verify + checkpoint + merge-back; parent runs `workflow advance` + `workflow delegation closeout` after acceptance.

        **DAG:** Canonical `depends_on` includes **`phase-3-rules-lifecycle`** and **`phase-4-mcp-settings-lifecycle`** (still **`pending`**). Treat upstream gaps explicitly in merge-back notes or complete/adjust dependencies before closing — do not silently ignore contract drift.

        Acceptance is not just new commands existing; explanation surfaces must match actual lifecycle behavior.
