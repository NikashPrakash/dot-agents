schema_version: 1
plan_id: resource-command-parity
tasks:
    - id: phase-1-command-contract
      title: Phase 1 — Define command-surface contract and scope boundaries for managed resources
      status: in_progress
      depends_on: []
      blocks:
        - phase-2-hooks-lifecycle
        - phase-3-rules-lifecycle
        - phase-4-mcp-settings-lifecycle
        - phase-5-readback-alignment
      owner: dot-agents
      write_scope:
        - .agents/workflow/plans/resource-command-parity/
        - docs/
        - commands/
      verification_required: true
      notes: |-
        Capture the approved audit into a canonical contract:
        - hooks: dedicated `hooks list`, `hooks show`, `hooks remove` (phase 2) plus indirect flows
        - rules, mcp, and settings have no dedicated command families and are managed indirectly
          through add/import/refresh/install/remove/status
        - agents are explicitly out of scope here (covered by agent-resource-lifecycle)
        - context, memory, and profiles remain out of scope by design unless a separate contract is approved

        Decide whether parity lands as per-resource families (`hooks ...`, `rules ...`, etc.) or a
        shared lifecycle surface with resource-specific adapters, then document the rationale before implementation.

        **feedback_goal:** Land the written contract under this plan + `docs/` + `commands/` so later phases cite one source of truth; tests/docs reflect the boundaries above; merge-back explains how already-shipped phase 2–5 behavior maps onto the contract (retrofit narrative), and calls out any TASKS `depends_on` / status mismatches that need a parent follow-up.

        **write_scope:** `.agents/workflow/plans/resource-command-parity/`, `docs/`, `commands/` (broad — coordinate merges with other branches touching the same command files).

        **context:** Active delegation bundle `.agents/active/delegation-bundles/del-phase-1-command-contract-1776548679.yaml` (project overlay `.agents/active/active.loop.md` only per D5; context: `.agents/active/loop-state.md`, this `TASKS.yaml`). Profile **loop-worker**. Worker: verify + checkpoint + merge-back; parent: `workflow advance` + `workflow delegation closeout` after acceptance. `workflow next` may report **no actionable task** while this delegation is open — treat canonical YAML + orient `active delegations` as truth.

        **reconciliation:** **`phase-2-hooks-lifecycle` is `completed`** while phase 1 was still open — use this pass to backfill the missing contract artifacts and rationale so downstream notes stop contradicting shipped hook lifecycle.
