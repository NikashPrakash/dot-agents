    - id: phase-2-plugin-contract
      title: Phase 2 — Canonical plugin contract on current architecture
      status: completed
      depends_on:
        - phase-1-salvage-audit
      blocks:
        - phase-3-planner-integration
      owner: dot-agents
      write_scope:
        - internal/config/
        - internal/platform/
        - schemas/
