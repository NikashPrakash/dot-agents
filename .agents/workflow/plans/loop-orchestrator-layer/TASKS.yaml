        2. commands/workflow_test.go — TestWorkflowGraphQueryCodeStructureRoutesToKGBridge: confirm the old
           error message is gone; TestWorkflowGraphQueryKGBridgeIntentsNotRouted: confirm isWorkflowGraphCode-
