        Tests: TestFanoutFromSlice, TestFanoutSliceAndTaskMutuallyExclusive, TestFanoutSliceNotFound,
        TestFanoutSliceAlreadyCompleted. See plan.md Phase 4 section for full code sketch and test shapes.
        - Fold-back: merge-back integrated — workflow fanout --slice resolves task/write_scope from SLICES.yaml.
    - id: phase-5-kg-first-understanding
