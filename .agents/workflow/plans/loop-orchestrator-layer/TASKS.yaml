        - Fold-back: merge-back integrated — workflow graph query forwards code-structure intents to kg bridge.
    - id: phase-6-fold-back-reconciliation
      title: Phase 6 — Implement workflow fold-back create/list with small vs proposal routing
      status: pending
      depends_on:
        - phase-4-fanout-from-slices
      blocks: []
      owner: dot-agents
      write_scope:
        - commands/workflow.go
        - commands/workflow_test.go
      verification_required: true
      notes: |
        Add "workflow fold-back" subcommand with two sub-subcommands: "create" and "list".
        "create" flags: --plan (required), --task (optional), --observation (required), --propose (bool).
        Routing: without --propose → append observation to task Notes in TASKS.yaml via saveCanonicalTasks;
        write .agents/active/fold-back/{id}.yaml artifact (classification: small). With --propose → write
        ~/.agents/proposals/obs-{timestamp}.md with YAML frontmatter; do NOT modify TASKS.yaml; artifact
        classification: proposal.
        "list" flags: --plan (optional filter). Reads .agents/active/fold-back/*.yaml; renders table:
        ID | Plan | Task | Classification | Routed-to | Created-at.
        New types: foldBackArtifact struct; new functions: runWorkflowFoldBackCreate, runWorkflowFoldBackList,
        writeFoldBackArtifact. Register foldBackCmd in cmd.AddCommand(...) at line ~468.
        Tests: TestFoldBackCreateSmall, TestFoldBackCreateNoTask, TestFoldBackCreatePropose, TestFoldBackList.
        See plan.md Phase 6 section for full struct definition, flag registration snippet, and test shapes.
    - id: phase-7-delegation-closeout-and-plan-reconcile
      title: Phase 7 — Reconcile completed delegations, merge-backs, and completed plans
      status: pending
      depends_on:
        - phase-6-fold-back-reconciliation
      blocks: []
      owner: dot-agents
      write_scope:
        - commands/workflow.go
        - commands/workflow_test.go
        - docs/LOOP_ORCHESTRATION_SPEC.md
        - .agents/active/
        - .agents/history/
      verification_required: true
      notes: |
        Add a parent-driven closeout/reconcile surface after merge-back so completed delegation artifacts do not
        stay in `.agents/active/` forever. Scope:
        1. consume a completed delegation contract + merge-back artifact as one closeout unit
        2. archive or relocate processed artifacts out of active state into durable history under the owning
           plan, using `.agents/history/<plan-id>/<optional-subplan>/delegate-merge-back-archive/<yyyy-mm-dd>/<task-or-slice>/`
           as the canonical destination instead of a repo-wide catchall archive
        3. advance the canonical task to completed/failed based on parent decision
        4. if the closed task completes the plan, update PLAN.yaml status/current_focus_task coherently
        5. define canonical plan retirement: `completed` remains in `.agents/workflow/plans/<plan-id>/` until
           verification/fold-back/cleanup are done; `archived` means the bundle has moved to
           `.agents/history/<plan-id>/plan-archive/<yyyy-mm-dd>/`
        6. archive the final bundle by preserving PLAN/TASKS/(optional) SLICES/narrative plan doc in the
           history tree, stamping the archived copy `status: archived`, and removing the source bundle from
           `.agents/workflow/plans/<plan-id>/`
        7. make orient/status pending-merge-back counts reflect unintegrated artifacts only
        8. document stale-active-contract cleanup rules for already-completed plans, including migration of legacy
           flat archives like `.agents/history/delegation-merge-back-archive/...`
        Candidate surface: `workflow delegation closeout` or `workflow reconcile delegation`.
        Tests should cover completed-contract archival, merge-back consumption, task completion, plan completion,
        completed-plan archive/removal from `.agents/workflow/plans/`, and stale completed-plan cleanup.
    - id: phase-8-delegate-prompt-and-file-inputs
      title: Phase 8 — Add per-delegate prompt and prompt-file inputs to orchestrator fanout bundles
      status: pending
      depends_on:
        - phase-4-fanout-from-slices
      blocks: []
      owner: dot-agents
      write_scope:
        - commands/workflow.go
        - commands/workflow_test.go
        - docs/LOOP_ORCHESTRATION_SPEC.md
        - .agents/skills/
        - schemas/
      verification_required: true
      notes: |
        Implement Phase 8 as a 3-layer delegation model:
        1. global loop-worker profile under `~/.agents/`
        2. repo-local project overlay prompt/guidance files
        3. per-delegation bundle artifact in repo state
        Direction:
        - add repeatable fanout flags such as `--delegate-profile`, `--project-overlay`, `--prompt`,
          `--prompt-file`, `--context-file`, `--feedback-goal`, `--scenario-tag`, `--regression-artifact`,
          and `--validation-queue`
        - persist those inputs in a sibling bundle artifact under
          `.agents/active/delegation-bundles/<delegation-id>.yaml`
        - add `schemas/workflow-delegation-bundle.schema.json` and embed it into the binary via `schemas/`
        - teach `orchestrator-session-start` / `delegation-lifecycle` to consume persisted bundles instead of
          reconstructing task handoff from memory
        - support six reusable testing additions in the bundle/profile contract:
          feedback_goal, scenario_tags, regression_matrix/regression_artifacts, higher-layer validation queue,
          evidence classification taxonomy, and sandbox policy for mutating verification
        - require negative-path coverage metadata when new failure modes are introduced
        - model worker closeout (`workflow verify record`, `workflow checkpoint`, `workflow merge-back`) separately
          from parent closeout (`workflow advance`, delegation closeout/archive)
        Tests should cover bundle persistence, inline prompt capture, prompt-file loading, repeated context files,
        reusable verification metadata capture, and no-leak behavior when multiple delegation contracts for
        different tasks use different bundles.
