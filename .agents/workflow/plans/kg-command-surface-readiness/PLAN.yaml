success_criteria: |-
    kg build and kg update produce a usable, verifiable code graph from a clean checkout with
    no undocumented preconditions. kg code-status reports provenance and freshness honestly.
    kg changes and kg impact return useful results and clearly distinguish empty-graph from
    no-impact in output and exit codes. kg flows/communities/postprocess have documented
    agent-ready vs expert-only decisions. kg serve MCP tools have a published parity matrix.
verification_strategy: |-
    Focused go test coverage in commands/kg/ and internal/graphstore/. Command-level smoke
    verification on known repo fixtures after each implementation task. Explicit repro cases
    for missing-config, stale-graph, and empty-result behavior.
