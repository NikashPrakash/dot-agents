status: completed
summary: |-
    Revived after runtime audit. Repo-owned impl/verifier/review prompt surfaces, typed artifacts, staged bundle expansion, and stage-specific worker prompts landed, but the live ralph pipeline still has remaining control-plane gaps around post-task review enforcement, task-scoped closeout cleanup, and scoped completion behavior for planning locks and replacement workers. The reopened task notes embed the runtime audit, existing command/spec anchors, and the deterministic-command vs agent-owned boundary so future runtime agents can execute from plan artifacts alone.
    - (fb:replacement-agent-retry) p11 done criteria includes replacement-agent retry logic for rate-limited/usage-capped provider bins (see RALPH_<ROLE>_AGENT_BIN fallback knobs in TASKS.yaml notes). This was not implemented in the p11 delivery. Env var knobs are documented in ralph-pipeline/ralph-worker headers. A follow-on task should wire retry-with-fallback-bin logic into ralph-pipeline stage dispatch when a stage exits with a rate-limit error code.
