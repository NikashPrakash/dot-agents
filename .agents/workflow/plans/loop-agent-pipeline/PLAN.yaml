success_criteria: The live ralph pipeline consumes fanout/bundle role metadata, dispatches real impl/verifier/review stages end-to-end, records verifier artifacts through an extended workflow verify record path, runs a post-task orchestrator review gate after merge-back, supports driving a scoped plan set (single id or comma-separated ids) to completion safely, blocks further delegation for a plan when planning or architectural review is required, and leaves enough task-local runtime context in plan artifacts that a follow-on runtime agent does not need prior chat history to understand the gap or target shape.
verification_strategy: Focused workflow tests, ralph script coverage for orchestration, dispatch, and post-task review branches, prompt/path checks for repo-local role surfaces, plan-lock / plan-target tests, and a final go test ./... pass after the runtime chain is wired.
