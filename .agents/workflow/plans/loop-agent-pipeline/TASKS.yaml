    - id: p11-plan-completion-mode
      title: Scoped plan-completion mode with planning locks and human-reviewed architectural pause points
      status: completed
      depends_on:
        - p7-post-closeout
        - p8-orchestrator-awareness
        - p10-workflow-command-decomposition
      blocks: []
      owner: dot-agents
      write_scope:
        - bin/tests/ralph-pipeline
        - bin/tests/ralph-orchestrate
        - bin/tests/ralph-closeout
        - commands/workflow.go
        - commands/workflow/
        - .agents/active/orchestrator.loop.md
        - docs/LOOP_ORCHESTRATION_SPEC.md
      verification_required: true
      notes: |-
        **feedback_goal:** Support "take plan(s) to completion" behavior for a scoped plan set while preserving parent review and stopping safely when planning is needed.

        **existing support:** `workflow next --plan <id>` already exists, and the spec already recognizes architect/orchestrator review, fold-back/proposal routing, and parent acceptance after merge-back. Historical design notes also called out `RALPH_RUN_PLAN` as a single id or comma-separated plan filter.

        **current code / spec anchors:** build on these instead of replacing them:
        - `commands/workflow/cmd.go` already exposes `workflow next --plan <id>`.
        - `.agents/workflow/specs/loop-agent-pipeline/decisions.1.md` D4 says the loop-break check should use `da --json workflow next --plan <id>` instead of parsing narrative output.
        - the same decisions doc D14 says `RALPH_RUN_PLAN` semantics are a single id or comma-separated scoped plan filter, not a broad scan of every active plan.
        - merge-back, delegation closeout, and fold-back persistence already exist in `commands/workflow`, so this task should compose or extend existing commands rather than recreating state transitions in shell.

        **what is still missing:** the runtime does not yet expose a scoped completion loop that:
        - accepts a single plan id or comma-separated list of plan ids
        - keeps selecting work only from that scoped plan set
        - runs the post-task orchestrator review gate after each task
        - pauses automatic delegation when cross-cutting / architectural findings require an analysis or planning task
        - blocks further bundles for that plan until the required planning artifact or human review is resolved
        - replaces a terminally failed worker/stage with a fresh agent for the same bundle + stage when repo state and artifacts show resumable progress

        **planning lock requirement:** when the orchestrator promotes an observation into a planning or architectural review item, delegation for that plan should pause so implementation drift is caught before more task fanout happens.

        **replacement-agent requirement:** terminal worker failures should not force the whole scoped completion run to stop when the task can safely resume from durable state. The control plane already has the right primitives:
        - one stable delegation bundle per task
        - stage-local done artifacts (`impl-handoff.yaml`, `<verifier>.result.yaml`, `merge-back.md`)
        - persisted repo worktree state
        - worker log classification for terminal causes such as usage-limit or workspace-permissions failures

        Build on that instead of inventing a second handoff protocol: when a stage fails for a resumable terminal reason such as provider usage cap, the pipeline should schedule a fresh worker for the same bundle/stage and let artifact gating decide how much work is already done. For usage-limit / rate-limit failures, do not blindly relaunch the same runtime with the same resolved agent bin. The replacement attempt should prefer a different configured runtime path using the existing role-scoped fallback knobs (`RALPH_<ROLE>_AGENT_BIN`, `RALPH_WORKER_AGENT_BIN`, `AGENT_BIN`, plus role/model overrides) so a capped provider does not immediately fail again for the same reason. Non-resumable causes such as unresolved workspace-permission setup should still stop and surface a real failure.

        **break-check requirement:** mirror the historical D4/D14 intent: run the deterministic "is there still actionable work?" check against each scoped plan and break only when all scoped plans are drained or paused.

        **scope semantics:** "take plan(s) to completion" does not mean "scan every active plan". It means:
        - if one id is passed, stay within that plan
        - if a comma-separated filter is passed, stay within that filtered set
        - do not drift into unrelated active plans the way current broad scans can

        **lock semantics:** if a plan enters a planning-required state, the completion driver should treat that plan as paused/blocked for delegation until the planning artifact, proposal review, or human decision is resolved. Other scoped plans may continue if they are not locked.

        **command candidates in scope:** evaluate a native `workflow complete --plan <id>[,<id>...]` style driver, plus first-class plan-lock surfaces if the existing task/delegation statuses are not enough to encode "pause this plan pending planning review". Also evaluate whether bundle/stage retry state should stay script-local or move into a deterministic command-owned resume helper so replacement-agent behavior, replacement budgets, and runtime fallback selection are observable and testable.

        **done means:** a scoped completion mode can drive one plan or a filtered set of plans forward task-by-task, replace resumable failed workers with fresh agents for the same bundle/stage, switch away from a rate-limited agent bin when fallback runtime options exist, and still yield to orchestrator review, proposal/planning flows, and plan-level locks instead of blindly draining the queue.
