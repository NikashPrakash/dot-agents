    - id: p7-post-closeout
      title: Post-task orchestrator review gate plus fold-back / proposal update
      status: completed
      depends_on:
        - p1-pipeline-control
        - p4-review-agent
        - p5-iter-log-v2
      blocks: []
      owner: dot-agents
      write_scope:
        - bin/tests/ralph-closeout
        - bin/tests/ralph-pipeline
        - commands/workflow.go
        - commands/workflow/
      verification_required: true
      notes: |-
        **feedback_goal:** Move the useful parent-side reasoning out of "session end closeout only" and into a per-task orchestrator review gate that runs immediately after a task's merge-back.

        **existing spec hooks:** the spec already expects parent review after merge-back, fold-back reconciliation, and proposal routing for larger cross-cutting changes. What is missing is a concrete runtime gate between task merge-back and "continue to the next task".

        **current runtime anchors:** some parent-side control is now present but still incomplete:
        - `bin/tests/ralph-pipeline` runs `ralph-review-gate` after the staged worker chain and blocks closeout when the gate fails.
        - `workflow delegation closeout` now archives merge-back, delegation, closeout, and accepted-task verification artifacts before retiring the active verification directory.
        - `workflow fold-back create|update|list` already exists, so the remaining gap is higher-level orchestration reasoning and deterministic reconciliation flow, not missing persistence primitives.

        **what this task now owns:** after a task finishes its impl/verifier/review chain and writes merge-back, the parent/orchestrator should:
        1. review merge-back plus typed verifier/review artifacts
        2. accept or reject the task
        3. reconcile fold-back observations and proposal-worthy architectural findings
        4. decide whether the plan may continue automatically or must pause for planning / human review

        **what is still missing:** the gate is still too lightweight for the full spec:
        - auto mode in `ralph-review-gate` is artifact-presence based rather than a real orchestrator judgment pass
        - fold-back / proposal routing decisions are still not applied as part of the task-scoped review gate
        - `ralph-closeout` still owns too much parent-side reconciliation logic instead of delegating more of it to deterministic `dot-agents workflow` helpers

        **pipeline implication:** some logic currently concentrated in `ralph-closeout` should still be split into "per-task review gate" vs "end-of-session / no-more-work cleanup". The task-scoped gate should happen before the next bundle for the same plan is delegated.

        **agent boundary:** the orchestrator/architect agent should decide:
        - whether the task is acceptable
        - whether an observation belongs in fold-back notes vs proposal queue
        - whether a cross-cutting finding requires a planning pause or human review

        **native command boundary:** after the agent decides, deterministic actions should be command-driven:
        - apply the parent decision
        - run delegation closeout / task advance
        - create or update fold-back artifacts
        - route proposal-worthy observations
        - checkpoint / archive task-scoped state

        **command candidates in scope:** evaluate whether the parent-side mechanics should collapse into a native helper such as a "parent review apply/finalize" command instead of leaving `ralph-closeout` to string together multiple workflow mutations.

        **done means:** the runtime has a real post-task orchestrator review step with repo-specific judgment rather than auto-accept heuristics, fold-back / proposal handling can happen at that step, and `ralph-closeout` is reduced to terminal cleanup rather than carrying all parent reasoning.
