    - id: p6-fanout-dispatch
      title: App-type dispatch and verifier-sequence wiring through plan schema, .agentsrc, delegation bundles, and runtime consumption
      status: completed
      depends_on:
        - p2-impl-agent-surface
        - p3a-result-schema
        - p3b-unit-verifier
        - p3c-api-verifier
        - p3d-ui-verifier
        - p3e-batch-verifier
        - p3f-streaming-verifier
        - p4-review-agent
        - p8-orchestrator-awareness
      blocks: []
      owner: dot-agents
      write_scope:
        - schemas/workflow-delegation-bundle.schema.json
        - schemas/workflow-plan.schema.json
        - schemas/agentsrc.schema.json
        - src/share/templates/standard/agentsrc.json
        - commands/workflow.go
        - commands/workflow/
      verification_required: true
      notes: |-
        **feedback_goal:** Make `app_type`, verifier profiles, and `verifier_sequence` drive the live role chain instead of stopping at bundle serialization.

        **what landed already:** plan schema, `.agentsrc`, bundle schema, and `workflow fanout` can resolve and persist `app_type` / `verifier_sequence`.

        **what is still missing:** the live `ralph-*` runtime does not consume that bundle metadata to spawn typed verifier or review stages. `verifier_sequence` is currently inert at runtime. The pipeline still executes one loop-worker path per bundle rather than `impl -> verifier(s) -> review`.

        **current code anchors:** keep these audited facts in view:
        - `commands/workflow/delegation.go` already resolves and persists `app_type` plus `verifier_sequence` into delegation bundles and related workflow metadata.
        - `commands/workflow/verification.go` already gives `workflow verify record --kind review` special handling that writes `.agents/active/verification/<task_id>/review-decision.yaml`.
        - non-review `workflow verify record` calls still append only `verification-log.jsonl`; they do not yet write typed `<verifier>.result.yaml` artifacts.
        - the spec and decisions docs already describe the intended staged chain, so this task is runtime alignment, not a fresh design spike.

        **implementation direction:** extend `workflow verify record` so verifier stages can write `.agents/active/verification/<task_id>/<verifier_type>.result.yaml` through the existing CLI surface instead of adding a sibling command that duplicates review/test logging behavior.

        **important constraint:** keep one canonical delegated task / contract per workflow task. Do not split impl, verifier, and review into separate top-level workflow tasks or separate delegation contracts.

        **native command boundary:** deterministic mechanics should move into `dot-agents`, not agent prompts:
        - resolve `app_type` / `verifier_sequence`
        - expand bundle metadata into a concrete per-task stage plan
        - validate verifier profile refs and prompt-file refs
        - write typed verifier artifacts through `workflow verify record`

        **agent boundary:** agents should still own non-deterministic work:
        - implementation choices inside `write_scope`
        - verifier-specific evidence gathering and pass/fail judgment
        - review acceptance / rejection / escalation reasoning

        **command candidates in scope:** this task should leave behind deterministic helpers such as:
        - a bundle/stage-plan readback command that expands one bundle into `impl`, ordered verifier stages, and `review`
        - an extended `workflow verify record` mode for non-review verifier result files
        - any minimal profile lookup helpers needed so shell no longer hand-parses bundle/runtime dispatch state

        **done means:** fanout metadata is structured so runtime dispatch can consume it deterministically, tests cover the resolved stage chain, and there is no remaining gap between bundle contract and script behavior.
    - id: p7-post-closeout
      title: Post-task orchestrator review gate plus fold-back / proposal update
      status: completed
      depends_on:
        - p1-pipeline-control
        - p4-review-agent
        - p5-iter-log-v2
      blocks: []
      owner: dot-agents
      write_scope:
        - bin/tests/ralph-closeout
        - bin/tests/ralph-pipeline
        - commands/workflow.go
        - commands/workflow/
      verification_required: true
      notes: |-
        **feedback_goal:** Move the useful parent-side reasoning out of "session end closeout only" and into a per-task orchestrator review gate that runs immediately after a task's merge-back.

        **existing spec hooks:** the spec already expects parent review after merge-back, fold-back reconciliation, and proposal routing for larger cross-cutting changes. What is missing is a concrete runtime gate between task merge-back and "continue to the next task".

        **current runtime anchors:** the present parent-side behavior is still too coarse:
        - `bin/tests/ralph-closeout` scans `.agents/active/merge-back/*.md`, auto-runs `workflow delegation closeout --decision accept` plus `workflow advance`, and optionally performs a read-only `workflow fold-back list --plan <id>` audit.
        - when `RALPH_CLOSEOUT_AUTO=0`, the review-style agent pass still happens during closeout, after worker fanout is done, rather than as a mandatory gate after each task.
        - `workflow fold-back create|update|list` already exists, so the gap is orchestration timing and deterministic reconciliation flow, not missing persistence primitives.

        **what this task now owns:** after a task finishes its impl/verifier/review chain and writes merge-back, the parent/orchestrator should:
        1. review merge-back plus typed verifier/review artifacts
        2. accept or reject the task
        3. reconcile fold-back observations and proposal-worthy architectural findings
        4. decide whether the plan may continue automatically or must pause for planning / human review

        **pipeline implication:** some logic currently concentrated in `ralph-closeout` should be split into "per-task review gate" vs "end-of-session / no-more-work cleanup". The task-scoped gate should happen before the next bundle for the same plan is delegated.

        **agent boundary:** the orchestrator/architect agent should decide:
        - whether the task is acceptable
        - whether an observation belongs in fold-back notes vs proposal queue
        - whether a cross-cutting finding requires a planning pause or human review

        **native command boundary:** after the agent decides, deterministic actions should be command-driven:
        - apply the parent decision
        - run delegation closeout / task advance
        - create or update fold-back artifacts
        - route proposal-worthy observations
        - checkpoint / archive task-scoped state

        **command candidates in scope:** evaluate whether the parent-side mechanics should collapse into a native helper such as a "parent review apply/finalize" command instead of leaving `ralph-closeout` to string together multiple workflow mutations.

        **done means:** the runtime has an explicit post-task orchestrator review step; fold-back / proposal handling can happen at that step; and `ralph-closeout` is reduced to terminal cleanup rather than carrying all parent reasoning.
    - id: p8-orchestrator-awareness
      title: Make orchestrator prompts and dispatch role-aware
      status: completed
      depends_on: []
      blocks:
        - p6-fanout-dispatch
      owner: dot-agents
      write_scope:
        - bin/tests/ralph-orchestrate
        - bin/tests/ralph-pipeline
        - bin/tests/ralph-worker
        - .agents/active/orchestrator.loop.md
        - docs/LOOP_ORCHESTRATION_SPEC.md
      verification_required: true
      notes: |-
        **feedback_goal:** Align the live `ralph-*` runtime with the spec's role-aware dispatch instead of only documenting it.

        **what landed already:** D5 prompt/overlay separation is documented better, and the repo has distinct impl/verifier/review prompt surfaces.

        **what is still missing:** `ralph-pipeline` still spawns only `ralph-worker`; `ralph-orchestrate` still fans out loop-worker bundles only; `ralph-worker` only uses role classification to select model or agent-bin overrides, then continues to load the loop-worker surface. It does not load `impl-agent.project.md`, verifier prompt files, or `review-agent.project.md` as distinct runtime phases.

        **current runtime anchors:** treat these as the baseline to replace:
        - `bin/tests/ralph-pipeline` phase 2 still launches `ralph-worker --bundle <path>` once per bundle, then runs `ralph-closeout`.
        - `bin/tests/ralph-orchestrate` still creates loop-worker-style bundles and tells the worker to load the loop-worker skill.
        - `bin/tests/ralph-worker` remains a Pattern E loop-worker caller; it parses one bundle, loops for `RALPH_ITERATIONS`, and stops on merge-back. Role classification only affects model / agent-bin override selection.
        - `docs/LOOP_ORCHESTRATION_SPEC.md` explicitly says Pattern E does not load `impl-agent.project.md`, which is why a staged runtime path is needed rather than more role heuristics inside the loop-worker prompt.

        **runtime target shape:** one canonical delegated task should still map to one task-scoped control-plane entry, but the runtime under that task should become a staged chain:
        1. impl stage
        2. zero or more verifier stages in bundle order
        3. review stage
        4. parent/orchestrator review gate

        **design guardrail:** preserve the task-scoped control plane. The refactor should introduce a task-chain runner or equivalent staged runtime beneath one bundle, not per-stage plans or per-stage delegations.

        **script boundary:** the scripts should remain thin wrappers around deterministic `dot-agents` commands plus agent invocations. Shell should not be the long-term home for:
        - plan break checks
        - stage expansion from bundle metadata
        - lock enforcement
        - parent-side reconciliation decisions once an agent has already produced a structured outcome

        **non-deterministic boundary:** role prompts remain agent-owned:
        - impl prompt decides how to implement
        - verifier prompt decides how to gather and interpret evidence
        - review prompt decides accept/reject/escalate

        **deterministic boundary:** `dot-agents` should own:
        - task selection inside a scoped plan set
        - stage sequencing from bundle metadata
        - artifact writes
        - plan/task lock checks
        - final task/plan reconciliation

        **done means:** the orchestrator and pipeline dispatch a real multi-stage chain, role-specific prompt surfaces are actually selected at runtime, and script behavior matches the spec's impl/verifier/review separation.
