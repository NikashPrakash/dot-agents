updated_at: "2026-04-19T21:03:37Z"
owner: dot-agents
success_criteria: |
    PR and release CI validate the same built Go binary (not launcher shims) under isolated HOME/AGENTS_HOME; Go test flags match between workflows (e.g. shared -race -count=1 -timeout discipline); packaging drift is caught on the PR path (e.g. goreleaser check); smoke coverage stays traceable against .agents/workflow/testing-matrix.yaml when that file exists; heavy or graph-preflight-dependent checks live in a named lane rather than destabilizing the default gate.
verification_strategy: |
    GitHub Actions (test.yml, auto-release.yml); shell smokes with SMOKE_HOME/SMOKE_AGENTS_HOME; optional matrix row references in workflow comments or task notes; fold-back to testing-matrix.yaml for scenario additions per LOOP_ORCHESTRATION_SPEC fold-back policy where appropriate.
