summary: Upgrade CI from basic compile-and-smoke coverage into a layered built-binary verification pipeline with isolated homes, broader command-surface coverage, release packaging checks, alignment with docs/LOOP_ORCHESTRATION_SPEC testing-matrix and scenario direction, and an explicit heavy-integration lane.
