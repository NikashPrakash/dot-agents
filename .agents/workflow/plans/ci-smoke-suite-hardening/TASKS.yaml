schema_version: 1
plan_id: ci-smoke-suite-hardening
tasks:
    - id: establish-toolchain-and-built-binary-baseline
      title: Add toolchain hygiene and built-binary baseline verification to CI
      status: pending
      depends_on: []
      blocks:
        - isolate-home-based-smoke-harness
        - release-packaging-and-parity
      owner: dot-agents
      write_scope:
        - .github/workflows/
        - scripts/
        - tests/
        - docs/
      verification_required: true
      notes: Add the missing baseline checks such as formatting, vet, direct buildability, and built-binary smoke validation so CI stops proving only launcher-shim behavior and partial compile success.
    - id: isolate-home-based-smoke-harness
      title: Move smoke flows to isolated HOME and AGENTS_HOME fixtures
      status: pending
      depends_on:
        - establish-toolchain-and-built-binary-baseline
      blocks:
        - expand-command-surface-smokes
        - release-packaging-and-parity
      owner: dot-agents
      write_scope:
        - .github/workflows/
        - scripts/
        - tests/
        - docs/
      verification_required: true
      notes: Make smoke jobs run against isolated homes and deterministic PATH inputs so CI stops inheriting runner state and hidden local config assumptions.
    - id: expand-command-surface-smokes
      title: Expand CLI smoke coverage for workflow, kg, and resource lifecycle surfaces
      status: pending
      depends_on:
        - isolate-home-based-smoke-harness
      blocks:
        - release-packaging-and-parity
        - define-heavy-integration-lane
      owner: dot-agents
      write_scope:
        - .github/workflows/
        - scripts/
        - tests/
        - commands/
        - docs/
      verification_required: true
      notes: Cover meaningful command surfaces that unit tests do not exercise well, especially workflow and kg entrypoints plus resource lifecycle paths where filesystem, flags, and layout assumptions tend to drift.
    - id: release-packaging-and-parity
      title: Add release packaging validation and align PR CI with release CI
      status: pending
      depends_on:
        - establish-toolchain-and-built-binary-baseline
        - isolate-home-based-smoke-harness
        - expand-command-surface-smokes
      blocks: []
      owner: dot-agents
      write_scope:
        - .github/workflows/
        - .goreleaser.yaml
        - scripts/
        - docs/
      verification_required: true
      notes: Run release packaging checks before auto-release is the first place config drift breaks, and keep the PR and release workflows validating the same built-binary and smoke assumptions.
    - id: define-heavy-integration-lane
      title: Define the intentional lane for heavy environment-sensitive integration checks
      status: pending
      depends_on:
        - expand-command-surface-smokes
      blocks: []
      owner: dot-agents
      write_scope:
        - .github/workflows/
        - tests/
        - docs/
      verification_required: false
      notes: Decide which checks such as environment-heavy Claude or containerized flows belong in nightly or manual workflows so they stay tracked without destabilizing the main PR gate.
