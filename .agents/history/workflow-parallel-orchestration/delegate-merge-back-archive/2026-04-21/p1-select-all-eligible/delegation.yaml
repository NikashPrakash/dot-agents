title: Implement selectAllEligibleTasks() — cross-plan unblocked task set
summary: Delegated from plan Workflow Parallel Orchestration Surface
write_scope:
    - commands/workflow/plan_task.go
success_criteria: |-
    New function alongside selectNextCanonicalTask in plan_task.go. Accepts projectPath +
    optional plan ID filter (same as next). Returns []workflowNextTaskSuggestion — ALL tasks
    across active plans where: plan.Status==active, task.Status pending or in_progress, no
    incomplete dependencies, no active delegation lock. selectNextCanonicalTask becomes a
    wrapper that calls this and returns [0]. write_scope already on the suggestion struct —
    no schema change needed.

    Cross-plan dep resolution (spec §4.3): a depends_on entry containing ''/'' is a cross-plan
    reference. Split on first ''/'' to get planID + taskID. Load
    workflow/plans/<planID>/TASKS.yaml and check that task''s status == completed. If the
    referenced plan or task cannot be loaded, treat the dep as unsatisfied and emit a warning.
    This is the only place dep resolution logic lives — p2 and p3 reuse this function.
