success_criteria: |-
    Given []workflowNextTaskSuggestion, compute ConflictsWith []string per task (other task IDs
    whose write_scope overlaps). Two tasks conflict if any path in one scope is a prefix of or
    equal to any path in the other (directory-aware: ''commands/workflow/'' conflicts with
    ''commands/workflow/plan_task.go''). Also compute MaxNonConflictingBatch: the largest subset
    of eligible tasks with zero pairwise conflicts (greedy, order by priority).
    Output struct: EligibleTasks []AnnotatedTask, MaxBatch []string (task IDs), ConflictGraph
    map[string][]string.
    Schema rule (additive struct pattern): ConflictsWith []string in AnnotatedTask must be
    initialized as []string{} not nil. MaxBatch []string{} not nil. ConflictGraph values must
    be []string{} not nil for each key. All render/display functions for AnnotatedTask are
    introduced in p3 (eligible cmd) — ensure p3's renderer surfaces all new fields.
