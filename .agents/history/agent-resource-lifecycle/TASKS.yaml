schema_version: 1
plan_id: agent-resource-lifecycle
tasks:
    - id: agents-promote
      title: agents promote <name> — repo .agents/agents/<name>/ → ~/.agents/agents/<project>/; repo dirs become symlinks
      status: completed
      depends_on: []
      blocks: []
      owner: dot-agents
      write_scope:
        - commands/agents.go
        - commands/agents_test.go
      verification_required: true
      notes: |-
        **feedback_goal:** `agents promote` behaves like `promoteSkillIn` for agents: copy to canonical ~/.agents, replace repo dirs with symlinks, register in .agentsrc.json, platform symlink under .claude/agents; `go test ./commands -run Agents` (or focused agents tests) passes; worker runs verify + checkpoint + merge-back.

        **write_scope:** commands/agents.go, commands/agents_test.go

        **context:** Active delegation bundle `del-agents-promote-1776416139`. Parallel with `agents-refresh-wiring` is OK (disjoint files). **Serialize before** `agents-import` / `agents-remove` — those tasks edit the same Go files.

        Mirror of promoteSkillIn() in commands/skills.go.

        Behaviour:
        - Source: .agents/agents/<name>/ in the current repo (must contain AGENT.md)
        - Canonical target: ~/.agents/agents/<project>/<name>/ (real directory, SOT)
        - After copy: replace repo .agents/agents/<name>/ with symlink → canonical target
        - Also create/update repo .claude/agents/<name>/ symlink → canonical target
        - Register name in .agentsrc.json agents[] list if not already present
        - Print next steps (dot-agents refresh to wire platform links)

        Edge cases: already-promoted (symlink exists), canonical already real dir (--force to overwrite), missing AGENT.md (error with hint).
    - id: agents-import
      title: agents import <name> — pull ~/.agents/agents/<project>/<name>/ into repo as symlink
      status: completed
      depends_on: []
      blocks: []
      owner: dot-agents
      write_scope:
        - commands/agents.go
        - commands/agents_test.go
      verification_required: true
      notes: |-
        **feedback_goal:** `agents import <name>` creates repo symlinks and .agentsrc registration from canonical tree; idempotent when already correct; tests cover happy path and edge cases; ready for merge-back after verify.

        **write_scope:** commands/agents.go, commands/agents_test.go

        **context:** Prior bundle `del-agents-import-1776434328` may still be referenced in merge-back; **this task remains in_progress until worker completes verify + merge-back.** **Safe in parallel** with `p1-pipeline-control` / `p2-impl-agent-surface` (disjoint files). **Do not** start the `agents-remove` worker (`del-agents-remove-1776438876`) until this task is advanced — same Go files.

        Reverse of promote: given a name registered in ~/.agents/agents/<project>/, create the repo symlinks.

        Behaviour:
        - Source: ~/.agents/agents/<project>/<name>/ (must exist and contain AGENT.md)
        - Creates .agents/agents/<name>/ → canonical (symlink)
        - Creates .claude/agents/<name>/ → canonical (symlink)
        - Registers name in .agentsrc.json agents[] if absent
        - Idempotent: no-op if symlinks already correct
    - id: agents-refresh-wiring
      title: Fix refresh and install to wire .agentsrc.json agents list and sync ~/.agents/agents/<project>/ → repo symlinks
      status: completed
      depends_on: []
      blocks: []
      owner: dot-agents
      write_scope:
        - internal/platform/claude.go
        - commands/refresh.go
        - commands/install.go
      verification_required: true
      notes: |-
        **feedback_goal:** `createAgentsLinks` implements real symlink healing; `install` wires `.agentsrc.json` agents[] into repo; refresh/install tests or focused integration checks pass; merge-back ready.

        **write_scope:** internal/platform/claude.go, commands/refresh.go, commands/install.go

        **context:** Active delegation bundle `del-agents-refresh-wiring-1776416139`. Safe to run parallel with `agents-promote` (no file overlap). Install path should reuse the same helper as `agents-import` once that exists — coordinate ordering if import lands after this worker (rebase or thin follow-up).

        Two surfaces to fix:

        1. createAgentsLinks() in internal/platform/claude.go is a no-op (line 288).
           Fix: scan ~/.agents/agents/<project>/ for agent dirs; for each, ensure
           .agents/agents/<name>/ and .claude/agents/<name>/ symlinks exist and resolve.
           This makes refresh idempotent and self-healing (same model as ensureUserSkills).

        2. install (commands/install.go) reads .agentsrc.json agents[] list but does not
           wire the agents. Fix: for each name in agents[], call the same logic as agents-import
           to create the repo symlinks from the canonical path.

        Acceptance: dot-agents refresh after adding a new agent to ~/.agents/agents/dot-agents/
        auto-creates the repo symlinks without requiring manual ln -s.
    - id: agents-remove
      title: agents remove <name> — unlink repo symlinks and optionally delete canonical
      status: completed
      depends_on: []
      blocks: []
      owner: dot-agents
      write_scope:
        - commands/agents.go
        - commands/agents_test.go
      verification_required: true
      notes: |-
        **feedback_goal:** `agents remove` unlinks repo symlinks, updates .agentsrc.json, optional --purge with confirmation; tests pass; merge-back ready.

        **write_scope:** commands/agents.go, commands/agents_test.go

        **context:** Delegation bundle `del-agents-remove-1776438876` (overlay `.agents/active/active.loop.md`, context: loop-state + this file). **Execution is blocked** until `agents-import` completes and advances — identical `commands/agents.go` / `commands/agents_test.go` scope; only one writer at a time. After import closes, worker runs verify + checkpoint + merge-back per bundle closeout.

        Cleanup counterpart to promote/import.

        Behaviour:
        - Removes .agents/agents/<name>/ symlink from repo
        - Removes .claude/agents/<name>/ symlink from repo
        - Removes name from .agentsrc.json agents[] list
        - --purge flag: also deletes ~/.agents/agents/<project>/<name>/ (with confirmation)
        - Without --purge: canonical dir is left intact (safe default)
