    Mirror of promoteSkillIn() in commands/skills.go.

    Behaviour:
    - Source: .agents/agents/<name>/ in the current repo (must contain AGENT.md)
    - Canonical target: ~/.agents/agents/<project>/<name>/ (real directory, SOT)
    - After copy: replace repo .agents/agents/<name>/ with symlink → canonical target
    - Also create/update repo .claude/agents/<name>/ symlink → canonical target
    - Register name in .agentsrc.json agents[] list if not already present
    - Print next steps (dot-agents refresh to wire platform links)

    Edge cases: already-promoted (symlink exists), canonical already real dir (--force to overwrite), missing AGENT.md (error with hint).
