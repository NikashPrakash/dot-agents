        - Fold-back: merge-back integrated — Phase E Postgres graphstore slice.
    - id: phase-f-go-mcp
      title: Phase F — Go MCP server embedded in dot-agents kg serve (stdio, JSON-RPC 2.0)
      status: completed
      depends_on:
        - phase-e-postgres
      blocks:
        - phase-g-skill-integration
      owner: dot-agents
      write_scope:
        - internal/graphstore/mcp_server.go
        - commands/kg.go
        - commands/kg_test.go
        - commands/add.go
        - commands/init.go
      verification_required: true
      notes: |-
        New file internal/graphstore/mcp_server.go: MCPServer struct with Serve(r, w), dispatch(method,
        id, params), and eight handler methods (one per tool). Transport: JSON-RPC 2.0 over stdin/stdout.
        Tool dispatch: method=="tools/call", route by params.name. Also handle "tools/list".
        Eight tools (drop-in parity with Python server):
          build_or_update_graph_tool, embed_graph_tool, list_graph_stats_tool, get_impact_radius_tool,
          semantic_search_nodes_tool, query_graph_tool, get_review_context_tool, get_docs_section_tool.
        All handlers delegate to CRGBridge (Phase B bridge). Input/output schemas are in plan.md Phase F.
        commands/kg.go: add kgServeCmd; runKGServe calls graphstore.NewMCPServer(cwd).Serve(os.Stdin, os.Stdout).
        commands/add.go: when adding MCP config, include dot-agents-kg entry using os.Executable() path
          with args ["kg","serve"] and type "stdio".
        commands/init.go: when agentsrc.json has a kg block, include dot-agents-kg MCP entry in generated
          platform configs for Claude Code and Cursor.
        Tests: TestKGServeToolsList, TestKGServeBuildOrUpdateGraph (mock CRGBridge), TestKGServeGetImpactRadius,
        TestKGServeUnknownTool (expect JSON-RPC error -32601).
        See plan.md Phase F for full struct definitions, tool catalog table, and test shapes.
        - Fold-back: merge-back integrated — Phase F Go MCP server slice.
    - id: phase-g-skill-integration
      title: Phase G — Wire build-graph / review-delta / review-pr skills to native dot-agents kg commands
      status: completed
      depends_on:
        - phase-f-go-mcp
      blocks: []
      owner: dot-agents
      write_scope:
        - src/share/templates/standard/skills/global/build-graph/
        - src/share/templates/standard/skills/global/review-delta/
        - src/share/templates/standard/skills/global/review-pr/
        - src/share/templates/standard/skills/global/self-review/
        - src/share/templates/standard/skills/global/agent-start/
        - .agents/skills/build-graph/
        - .agents/skills/review-delta/
        - .agents/skills/review-pr/
        - .agents/skills/self-review/
        - .agents/skills/agent-start/
        - internal/scaffold/hooks/global/graph-update/
        - internal/scaffold/hooks/global/graph-orient/
        - internal/scaffold/hooks/global/graph-precommit/
        - ~/.agents/hooks/global/
      verification_required: true
      notes: |-
        Deferred until Phase E/F are exercised. When this task activates, the concrete changes are:
        build-graph skill: replace MCP tool calls (build_or_update_graph_tool, list_graph_stats_tool)
          with "dot-agents kg build" and "dot-agents kg code-status" CLI invocations.
        review-delta skill: replace build_or_update_graph_tool with "dot-agents kg update"; replace
          get_review_context_tool with "dot-agents kg changes --brief"; replace get_impact_radius_tool
          with "dot-agents kg impact <file>".
        review-pr skill: same as review-delta plus replace semantic_search_nodes_tool with
          "dot-agents kg search <query>".
        self-review skill: add "dot-agents kg changes --brief" call before the review summary.
        agent-start skill: already calls "dot-agents workflow orient" which includes graph health;
          verify graph status is surfaced or add "dot-agents kg status" call.
        Canonical hooks in ~/.agents/hooks/global/:
          graph-update/HOOK.yaml (post_tool_use, Edit|Write|Bash matcher, "dot-agents kg update --skip-flows")
          graph-orient/HOOK.yaml (session_start, "dot-agents kg status")
          graph-precommit/HOOK.yaml (pre_commit, "dot-agents kg changes --brief")
        See plan.md Hooks Integration section for exact HOOK.yaml content.

        Merge-back 2026-04-12: Canonical embedded copies under
        src/share/templates/standard/skills/global/ (build-graph, review-delta, review-pr); self-review/agent-start
        touch-ups. 2026-04-12: Embedded global hook bundles under internal/scaffold/hooks/global/
        (graph-update, graph-orient, graph-precommit with Bash/git-commit gate for kg changes --brief).
        Runtime copies live under ~/.agents/hooks/global/ after init/CopyMissingGlobalBundles.
        - Fold-back: merge-back integrated — Phase G embedded CRG skills + global graph hooks; crg-kg plan closed.
