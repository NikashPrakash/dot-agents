success_criteria: |
    New file internal/graphstore/mcp_server.go: MCPServer struct with Serve(r, w), dispatch(method,
    id, params), and eight handler methods (one per tool). Transport: JSON-RPC 2.0 over stdin/stdout.
    Tool dispatch: method=="tools/call", route by params.name. Also handle "tools/list".
    Eight tools (drop-in parity with Python server):
      build_or_update_graph_tool, embed_graph_tool, list_graph_stats_tool, get_impact_radius_tool,
      semantic_search_nodes_tool, query_graph_tool, get_review_context_tool, get_docs_section_tool.
    All handlers delegate to CRGBridge (Phase B bridge). Input/output schemas are in plan.md Phase F.
    commands/kg.go: add kgServeCmd; runKGServe calls graphstore.NewMCPServer(cwd).Serve(os.Stdin, os.Stdout).
    commands/add.go: when adding MCP config, include dot-agents-kg entry using os.Executable() path
      with args ["kg","serve"] and type "stdio".
    commands/init.go: when agentsrc.json has a kg block, include dot-agents-kg MCP entry in generated
      platform configs for Claude Code and Cursor.
    Tests: TestKGServeToolsList, TestKGServeBuildOrUpdateGraph (mock CRGBridge), TestKGServeGetImpactRadius,
    TestKGServeUnknownTool (expect JSON-RPC error -32601).
    See plan.md Phase F for full struct definitions, tool catalog table, and test shapes.
