        - commands/
        - docs/
      verification_required: true
      notes: |-
        Coordinator first — extend the shared resource descriptor layer in internal/platform/ to declare new
        bucket types: commands, output-styles, ignore, modes, plugins (fed by plugin-resource-salvage plan),
        themes, prompts.
        For each bucket: define CanonicalBucket constant, add listScopedResourceDirs call pattern,
        add emitter to each applicable platform adapter (CreateLinks).
        Extend init, import, refresh, status, explain for each new bucket following the Stage 1 pattern.
        Worker split (can run after coordinator lands):
          Worker A: Cursor + Claude additions
          Worker B: OpenCode additions
          Worker C: Copilot additions
        Acceptance: go test ./...; dot-agents status shows new bucket entries; round-trip import/refresh
        preserves new bucket files.
        - Fold-back: merge-back integrated — Stage 2 bucket expansion slice landed.
