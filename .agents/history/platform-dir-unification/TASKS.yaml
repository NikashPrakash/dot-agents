      title: Phase 4 — Delete orphaned bash command and platform files
      status: completed
      depends_on: []
      blocks:
        - phase-5-new-buckets
      owner: dot-agents
      write_scope:
        - src/lib/commands/
        - src/lib/platforms/
        - src/lib/utils/resource-restore-map.sh
        - src/bin/
        - scripts/
        - tests/
      verification_required: true
      notes: |-
        Delete these files in a single commit:
          src/lib/commands/init.sh
          src/lib/commands/import.sh
          src/lib/commands/refresh.sh
          src/lib/commands/status.sh
          src/lib/commands/explain.sh
          src/lib/utils/resource-restore-map.sh
          src/lib/platforms/cursor.sh
          src/lib/platforms/claude-code.sh
          src/lib/platforms/codex.sh
          src/lib/platforms/opencode.sh
          src/lib/platforms/github-copilot.sh
        Before deleting: confirm src/bin/dot-agents does not delegate any of init/import/refresh/status/explain to these files.
        If it does, replace the delegation with a direct exec of the Go binary.
        After deletion: grep src/ scripts/ tests/ for any remaining `source` or `.` references to the deleted paths and remove them.
        Acceptance: go test ./... passes; scripts/verify.sh passes; no source/. references to deleted files remain.
        - Fold-back: merge-back integrated — bash deprecation slice for platform-dir-unification.
