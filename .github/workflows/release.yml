name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Verify CLI version matches tag
        run: |
          chmod +x src/bin/dot-agents
          CLI_VERSION=$(./src/bin/dot-agents --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          # Strip pre-release suffix (-dev, -rc.1, -beta, etc.) for comparison
          TAG_BASE_VERSION=$(echo "$TAG_VERSION" | sed 's/-.*//')
          if [ "$CLI_VERSION" != "$TAG_BASE_VERSION" ]; then
            echo "CLI version ($CLI_VERSION) does not match tag base version ($TAG_BASE_VERSION)"
            exit 1
          fi
          echo "Version check passed: CLI=$CLI_VERSION, Tag=$TAG_VERSION"

      - name: Run tests before release
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          chmod +x src/bin/dot-agents
          ./src/bin/dot-agents --version
          ./src/bin/dot-agents --help
          ./src/bin/dot-agents init --dry-run

      - name: Create tarball
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          # Create tarball with specific files to avoid "file changed" errors
          tar -czf "dot-agents-${VERSION}.tar.gz" \
            --exclude='*.tar.gz' \
            src/ \
            scripts/ \
            Formula/ \
            README.md \
            LICENSE \
            CHANGELOG.md \
            SPEC.md

      - name: Generate SHA256
        id: sha256
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          SHA256=$(shasum -a 256 "dot-agents-${VERSION}.tar.gz" | cut -d ' ' -f 1)
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA256"
          echo "$SHA256" > "dot-agents-${VERSION}.tar.gz.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          # Use draft for dev repo, publish for prod
          draft: ${{ github.repository != 'dot-agents/dot-agents' }}
          generate_release_notes: true
          files: |
            dot-agents-*.tar.gz
            dot-agents-*.tar.gz.sha256
          body: |
            ## Installation

            ### Homebrew (production only)
            ```bash
            brew tap dot-agents/tap
            brew install dot-agents
            ```

            ### Direct Install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/scripts/install.sh | bash
            ```

            ### SHA256
            ```
            ${{ steps.sha256.outputs.sha256 }}
            ```

            ## Quick Start
            ```bash
            dot-agents init
            dot-agents add ~/your-project
            dot-agents status
            ```
