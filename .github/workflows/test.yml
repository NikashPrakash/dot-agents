name: Test

on:
  push:
    branches: 
      - master
      - feature/*
  pull_request:
    branches: 
      - master
      - feature/*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  GO_TEST_FLAGS: -race -count=1 -timeout=300s

jobs:
  lint-workflows:
    name: Lint Workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate YAML syntax
        run: |
          ruby -e 'require "yaml"; Dir[".github/workflows/*.yml"].sort.each { |f| puts "Validating #{f}..."; YAML.load_file(f) }'
          echo "All workflow files have valid YAML syntax"

      - name: Install actionlint
        run: |
          curl --proto "=https" --tlsv1.2 -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash

      - name: Run actionlint
        run: |
          # Run actionlint but only fail on errors, not warnings
          # -ignore flag skips shellcheck info/style issues
          ./actionlint -color \
            -ignore 'SC2002:' \
            -ignore 'SC2086:' \
            -ignore 'is too old to run'

  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: lint-workflows  # Only run tests if workflows are valid
    env:
      SMOKE_HOME: /tmp/smoke-${{ github.run_id }}
      SMOKE_AGENTS_HOME: /tmp/smoke-${{ github.run_id }}/.agents
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Verify jq installed
        run: jq --version

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l ./cmd ./commands ./internal)
          if [ -n "$unformatted" ]; then
            echo "The following files need gofmt formatting:"
            echo "$unformatted"
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./... $GO_TEST_FLAGS

      - name: Build CLI
        run: go build -o ./bin/dot-agents ./cmd/dot-agents

      - name: Verify built binary is real Go binary (not a shim)
        run: |
          file ./bin/dot-agents | grep -qE "(ELF|Mach-O|PE32)"

      # ── Smoke isolation ──────────────────────────────────────────────────
      # All smoke steps below override HOME and AGENTS_HOME so they cannot
      # inherit the runner's real ~/.agents config or links.
      - name: Test --version
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents --version
          ./bin/dot-agents --version | grep -q "dot-agents"

      - name: Test --help
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents --help
          ./bin/dot-agents --help | grep -q "Usage:"

      - name: Test init --dry-run
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents init --dry-run

      - name: Test init (creates ~/.agents/)
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          # Remove if exists from previous run
          rm -rf "${HOME}/.agents"
          ./bin/dot-agents init --yes
          test -d "${HOME}/.agents"
          test -f "${HOME}/.agents/config.json"

      - name: Test status
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents status
          ./bin/dot-agents status --json | jq .

      - name: Test doctor
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents doctor

      - name: Test add (with test project)
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          mkdir -p /tmp/test-project
          ./bin/dot-agents add /tmp/test-project --name ci-test --yes
          ./bin/dot-agents status >/tmp/dot-agents-status.txt
          grep -q "ci-test" /tmp/dot-agents-status.txt

      - name: Test status --audit
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents status --audit

      - name: Test remove --dry-run
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents remove ci-test --dry-run

      - name: Test sync status
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents sync status

      - name: Test skills list
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents skills list

      - name: Test workflow status
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents workflow status

      - name: Test workflow health
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents workflow health | grep -qiE "(healthy|health)"

      - name: Test workflow plan
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents workflow plan

      - name: Test workflow orient
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents workflow orient

      - name: Test workflow next
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents workflow next

      - name: Test kg --help
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents kg --help | grep -q "knowledge graph"

      - name: Test kg bridge health
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents kg bridge health

      - name: Test agents list
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents agents list

      - name: Test hooks list
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents hooks list

      - name: Test rules list
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents rules list

      - name: Test mcp list
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents mcp list

      - name: Test settings list
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents settings list

      - name: Cleanup
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          rm -rf "${HOME}/.agents"
          rm -rf /tmp/test-project
          rm -rf "${SMOKE_HOME}"
