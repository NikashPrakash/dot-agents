name: Test

on:
  push:
    branches: 
      - master
      - feature/*
  pull_request:
    branches: 
      - master
      - feature/*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-workflows:
    name: Lint Workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate YAML syntax
        run: |
          for file in .github/workflows/*.yml; do
            echo "Validating $file..."
            python3 -c "import yaml; yaml.safe_load(open('$file'))" || exit 1
          done
          echo "All workflow files have valid YAML syntax"

      - name: Install actionlint
        run: |
          curl --proto "=https" --tlsv1.2 -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash

      - name: Run actionlint
        run: |
          # Run actionlint but only fail on errors, not warnings
          # -ignore flag skips shellcheck info/style issues
          ./actionlint -color \
            -ignore 'SC2002:' \
            -ignore 'SC2086:' \
            -ignore 'is too old to run'

  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: lint-workflows  # Only run tests if workflows are valid
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Verify jq installed
        run: jq --version

      - name: Go test
        run: go test ./...

      - name: Make CLI executable
        run: chmod +x src/bin/dot-agents

      - name: Test --version
        run: |
          ./src/bin/dot-agents --version
          ./src/bin/dot-agents --version | grep -q "dot-agents"

      - name: Test --help
        run: |
          ./src/bin/dot-agents --help
          ./src/bin/dot-agents --help | grep -q "Usage:"

      - name: Test init --dry-run
        run: |
          ./src/bin/dot-agents init --dry-run

      - name: Test init (creates ~/.agents/)
        run: |
          # Remove if exists from previous run
          rm -rf ~/.agents
          ./src/bin/dot-agents init --yes
          test -d ~/.agents
          test -f ~/.agents/config.json

      - name: Test status
        run: |
          ./src/bin/dot-agents status
          ./src/bin/dot-agents status --json | jq .

      - name: Test doctor
        run: |
          ./src/bin/dot-agents doctor

      - name: Test add (with test project)
        run: |
          mkdir -p /tmp/test-project
          ./src/bin/dot-agents add /tmp/test-project --name ci-test --yes
          ./src/bin/dot-agents status | grep -q "ci-test"

      - name: Test status --audit
        run: |
          ./src/bin/dot-agents status --audit

      - name: Test remove --dry-run
        run: |
          ./src/bin/dot-agents remove ci-test --dry-run

      - name: Test sync status
        run: |
          ./src/bin/dot-agents sync status

      - name: Cleanup
        run: |
          rm -rf ~/.agents
          rm -rf /tmp/test-project
