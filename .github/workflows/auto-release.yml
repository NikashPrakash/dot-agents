name: Auto Release

on:
  push:
    branches: [master]
    paths:
      - 'VERSION'

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tagging

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if release exists
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release v${{ steps.version.outputs.version }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release v${{ steps.version.outputs.version }} does not exist, will create"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify CLI version matches
        if: steps.check.outputs.exists == 'false'
        run: |
          chmod +x src/bin/dot-agents
          CLI_VERSION=$(./src/bin/dot-agents --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          FILE_VERSION="${{ steps.version.outputs.version }}"
          if [ "$CLI_VERSION" != "$FILE_VERSION" ]; then
            echo "CLI reports version $CLI_VERSION but VERSION file has $FILE_VERSION"
            echo "This may be okay if VERSION file is the source of truth"
          fi
          echo "Version check: CLI=$CLI_VERSION, File=$FILE_VERSION"

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: |
         sudo apt-get update && sudo apt-get install -y jq

      - name: Set up Go
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Run Go tests
        if: steps.check.outputs.exists == 'false'
        run: go test ./...

      - name: Run tests
        if: steps.check.outputs.exists == 'false'
        run: |
          chmod +x src/bin/dot-agents
          ./src/bin/dot-agents --version
          ./src/bin/dot-agents --help
          ./src/bin/dot-agents init --yes
          ./src/bin/dot-agents status
          ./src/bin/dot-agents doctor

      - name: Install GoReleaser
        if: steps.check.outputs.exists == 'false'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          install-only: true

      - name: Run GoReleaser
        if: steps.check.outputs.exists == 'false'
        env:
          GORELEASER_CURRENT_TAG: v${{ steps.version.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOT_AGENTS_PAT: ${{ secrets.DOT_AGENTS_PAT }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # Ensure an annotated tag for this version exists
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

          # Let GoReleaser handle GitHub release + archives + Homebrew
          goreleaser release --clean --verbose
