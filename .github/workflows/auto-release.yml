name: Auto Release

on:
  push:
    branches: [master]
    paths:
      - 'VERSION'

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

env:
  GO_TEST_FLAGS: -race -count=1 -timeout=300s

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    env:
      SMOKE_HOME: /tmp/release-smoke-${{ github.run_id }}
      SMOKE_AGENTS_HOME: /tmp/release-smoke-${{ github.run_id }}/.agents

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for tagging

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if release exists
        id: check
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release v${{ steps.version.outputs.version }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release v${{ steps.version.outputs.version }} does not exist, will create"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        if: steps.check.outputs.exists == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Install dependencies
        if: steps.check.outputs.exists == 'false'
        run: |
          sudo apt-get update && sudo apt-get install -y jq

      - name: Build CLI
        if: steps.check.outputs.exists == 'false'
        run: |
          go build \
            -ldflags "-X github.com/NikashPrakash/dot-agents/commands.Version=${{ steps.version.outputs.version }} -X github.com/NikashPrakash/dot-agents/commands.Commit=${GITHUB_SHA} -X github.com/NikashPrakash/dot-agents/commands.Describe=v${{ steps.version.outputs.version }}" \
            -o ./bin/dot-agents ./cmd/dot-agents

      - name: Verify CLI version matches
        if: steps.check.outputs.exists == 'false'
        run: |
          CLI_VERSION=$(./bin/dot-agents --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          FILE_VERSION="${{ steps.version.outputs.version }}"
          if [ "$CLI_VERSION" != "$FILE_VERSION" ]; then
            echo "CLI reports version $CLI_VERSION but VERSION file has $FILE_VERSION"
            exit 1
          fi
          echo "Version check: CLI=$CLI_VERSION, File=$FILE_VERSION"

      - name: Run Go tests
        if: steps.check.outputs.exists == 'false'
        run: go test $GO_TEST_FLAGS ./...

      - name: Run built-binary smoke tests
        if: steps.check.outputs.exists == 'false'
        env:
          HOME: ${{ env.SMOKE_HOME }}
          AGENTS_HOME: ${{ env.SMOKE_AGENTS_HOME }}
        run: |
          ./bin/dot-agents --version
          ./bin/dot-agents --help
          ./bin/dot-agents init --yes
          test -d "${HOME}/.agents"
          ./bin/dot-agents status
          ./bin/dot-agents doctor

      - name: Install GoReleaser
        if: steps.check.outputs.exists == 'false'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          install-only: true

      - name: Run GoReleaser
        if: steps.check.outputs.exists == 'false'
        env:
          GORELEASER_CURRENT_TAG: v${{ steps.version.outputs.version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOT_AGENTS_PAT: ${{ secrets.DOT_AGENTS_PAT }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # Ensure an annotated tag for this version exists
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

          # Let GoReleaser handle GitHub release + archives + Homebrew
          goreleaser release --clean --verbose

      - name: Cleanup smoke home
        if: always()
        run: rm -rf "${SMOKE_HOME}"
